version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-clm_db}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clm -d clm_db"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations
      - ./generated_docs:/app/generated_docs
      - ./uploads:/app/uploads
      - ./seed:/app/seed
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
