{% extends "layouts/base.html" %}
{% block title %}Dev Login — CLM-lite{% endblock %}
{% block public_content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-lg" style="max-width: 450px; width: 100%;">
        <div class="card-body p-5">
            <h3 class="text-center mb-2"><i class="bi bi-file-earmark-text"></i> CLM-lite</h3>
            <p class="text-center text-muted mb-4">Development Login</p>
            <div class="alert alert-info small">
                <i class="bi bi-info-circle"></i> Dev login is enabled. This bypasses OIDC for local testing.
            </div>
            <form method="POST" action="/auth/dev-login">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="admin@clm.local" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In (Dev Mode)
                </button>
            </form>
            <hr>
            <p class="small text-muted text-center mb-0">
                In production, this page is replaced by OIDC SSO (Azure AD / Google).
            </p>
        </div>
    </div>
</div>
{% endblock %}
